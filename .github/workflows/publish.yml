name: Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '25' # Update Node version to 25
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm run build
      - name: Publish
        run: npm run publish